version: '3.8'

services:
  web:
    build: .
    restart: always
    volumes:
      # Сохраняем базу данных на сервере в папке ./data
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # ВАЖНО: ЗАМЕНИ ПУТЬ СЛЕВА НА ТОТ, ГДЕ ЛЕЖАТ ТВОИ СЕРТИФИКАТЫ НА UBUNTU
      - /etc/letsencrypt/live/твой_домен.com:/etc/nginx/ssl:ro
    depends_on:
      - web
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Panel — Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-card h4 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .login-card .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 10px;
            padding: 0.65rem 1rem;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #7c6ff7;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(124,111,247,0.25);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.3); }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 0.4rem; }
        .btn-login {
            background: linear-gradient(135deg, #7c6ff7, #5a4fcf);
            border: none;
            border-radius: 10px;
            padding: 0.7rem;
            font-weight: 600;
            color: #fff;
            width: 100%;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: 0.88; color: #fff; }
        .alert-danger {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.35);
            color: #f8a0a9;
            border-radius: 10px;
            font-size: 0.875rem;
        }
        .logo { font-size: 2rem; margin-bottom: 0.75rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center">
            <div class="logo">🔐</div>
            <h4>VPN Admin Panel</h4>
            <p class="subtitle">Введите учётные данные для входа</p>
        </div>

        {% if error %}
        <div class="alert alert-danger mb-3">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login">Войти</button>
        </form>
    </div>
</body>
</html>
